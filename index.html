            body { background-color: white; }

    <!-- Scripts -->
    <script>
        // --- 1. State & Configuration ---
        const SPREADSHEET_ID = '1G11Ww-aE5EQPZ2rWusHrW511EyXY9lNmxpjuAeR0N_8';
        const EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=xlsx`;
        
        let rawDatabase = [];
        let rawCompanyList = [];
        let filteredData = [];
        
        // 동적으로 파악할 컬럼 키들
        let colKeys = {
            date: null,
            company: null,
            avgRev: null,  // 월평균매출
            currRev: null, // 당월매출액
            opDays: null   // 운영일
        };

        let filterState = {
            avgRev: new Set(),
            currRev: new Set(),
            opDays: new Set()
        };

        let chartInstance = null;
        let debounceTimer;

        // --- 2. Initialization & Data Fetching ---
        async function initDashboard() {
            try {
                // Fetch XLSX file directly (Requires sheet to be public)
                const response = await fetch(EXPORT_URL);
                if (!response.ok) throw new Error("네트워크 응답이 실패했습니다. (CORS 또는 권한 문제 가능성)");
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
                
                // Read 'Database' sheet
                const dbSheetName = workbook.SheetNames.find(n => n.includes('Database')) || workbook.SheetNames[0];
                rawDatabase = XLSX.utils.sheet_to_json(workbook.Sheets[dbSheetName], { defval: "" });
                
                // Read 'Company_List' sheet
                const compSheetName = workbook.SheetNames.find(n => n.includes('Company_List')) || workbook.SheetNames[1];
                if(compSheetName) {
                    rawCompanyList = XLSX.utils.sheet_to_json(workbook.Sheets[compSheetName], { defval: "" });
                }

                document.getElementById('dataStatus').textContent = '실시간 연결됨';
                document.getElementById('dataStatus').classList.add('bg-green-500/20', 'text-green-100');

            } catch (error) {
                console.warn("구글 시트 연동 실패. 시트가 비공개 상태일 수 있습니다. 모의 데이터로 대체합니다.", error);
                document.getElementById('dataStatus').textContent = '모의 데이터 (연결 실패)';
                document.getElementById('dataStatus').classList.add('bg-yellow-500/20', 'text-yellow-100');
                generateMockData();
            }

            if (rawDatabase.length === 0) {
                generateMockData();
            }

            identifyColumns();
            normalizeDates();
            initializeFilterUI();
            
            // Set Default Date (당월)
            setDefaultDateRange();

            document.getElementById('loadingOverlay').style.display = 'none';
            applyFilters(); // Initial render
        }

        // 구글시트 연동 실패 시 실행을 위한 목업 데이터 생성기
        function generateMockData() {
            rawDatabase = [];
            const companies = ['(주)알파', '(주)베타테크', '감마솔루션', '델타네트웍스'];
            const avgRevs = ['1천만 이하', '1천만~5천만', '5천만 이상'];
            const opDaysList = ['20일 미만', '20일~25일', '25일 이상'];
            
            let currentDate = new Date();
            currentDate.setMonth(currentDate.getMonth() - 6); // 6개월 전부터

            for (let i = 0; i < 200; i++) {
                let d = new Date(currentDate.getTime() + Math.random() * 180 * 24 * 60 * 60 * 1000);
                let rev = Math.floor(Math.random() * 50000000) + 5000000;
                rawDatabase.push({
                    "날짜": d.toISOString().split('T')[0],
                    "업체명": companies[Math.floor(Math.random() * companies.length)],
                    "월평균매출": avgRevs[Math.floor(Math.random() * avgRevs.length)],
                    "당월매출액": rev,
                    "운영일": opDaysList[Math.floor(Math.random() * opDaysList.length)]
                });
            }
            
            // Sort by date
            rawDatabase.sort((a,b) => new Date(a["날짜"]) - new Date(b["날짜"]));
        }

        // --- 3. Data Processing ---
        function identifyColumns() {
            if (rawDatabase.length === 0) return;
            const keys = Object.keys(rawDatabase[0]);
            
            // 1번째 컬럼은 날짜
            colKeys.date = keys[0];
            
            // 키워드 매칭으로 찾기
            colKeys.company = keys.find(k => k.includes('업체') || k.includes('회사') || k.includes('Company')) || keys[1];
            colKeys.avgRev = keys.find(k => k.includes('월평균매출')) || null;
            colKeys.currRev = keys.find(k => k.includes('당월매출액') || k.includes('매출')) || null;
            colKeys.opDays = keys.find(k => k.includes('운영일')) || null;
        }

        function normalizeDates() {
            rawDatabase.forEach(row => {
                let val = row[colKeys.date];
                if (val instanceof Date) {
                    row._jsDate = val;
                } else if (typeof val === 'number') {
                    // Excel serial date to JS Date
                    row._jsDate = new Date(Math.round((val - 25569) * 86400 * 1000));
                } else if (typeof val === 'string') {
                    row._jsDate = new Date(val);
                } else {
                    row._jsDate = new Date(); // fallback
                }
                row._dateStr = row._jsDate.toISOString().split('T')[0];
            });
        }

        function setDefaultDateRange() {
            if (rawDatabase.length === 0) return;

            // 대량 데이터에서 Math.min/max로 인한 Maximum call stack size exceeded 에러 방지를 위해 루프 방식으로 안전하게 비교
            let minDate = rawDatabase[0]._jsDate;
            let maxDate = rawDatabase[0]._jsDate;

            for (let i = 1; i < rawDatabase.length; i++) {
                const current = rawDatabase[i]._jsDate;
                if (current < minDate) minDate = current;
                if (current > maxDate) maxDate = current;
            }
            
            // 기본값: 당월 (데이터의 가장 최근 달을 당월로 간주)
            let defaultStart = new Date(maxDate.getFullYear(), maxDate.getMonth(), 1);
            let defaultEnd = new Date(maxDate.getFullYear(), maxDate.getMonth() + 1, 0); // 마지막 날

            document.getElementById('dateStart').value = defaultStart.toISOString().split('T')[0];
            document.getElementById('dateEnd').value = defaultEnd.toISOString().split('T')[0];
            
            // Set min/max boundaries
            document.getElementById('dateStart').min = minDate.toISOString().split('T')[0];
            document.getElementById('dateEnd').max = maxDate.toISOString().split('T')[0];
        }

        // --- 4. Filter UI & Logic ---
        function getUniqueValues(colKey) {
            if (!colKey) return [];
            const vals = rawDatabase.map(r => r[colKey]).filter(v => v !== null && v !== "");
            return [...new Set(vals)].sort();
        }

        function initializeFilterUI() {
            const setups = [
                { id: 'avgRev', key: colKeys.avgRev },
                { id: 'currRev', key: colKeys.currRev },
                { id: 'opDays', key: colKeys.opDays }
            ];

            setups.forEach(setup => {
                const listEl = document.getElementById(`list-${setup.id}`);
                const wrapper = document.getElementById(`filter-wrapper-${setup.id}`);
                
                if (!setup.key) {
                    wrapper.style.opacity = '0.5';
                    wrapper.style.pointerEvents = 'none';
                    document.getElementById(`label-${setup.id}`).textContent = "데이터 없음";
                    return;
                }

                const uniqueVals = getUniqueValues(setup.key);
                filterState[setup.id] = new Set(uniqueVals); // All selected by default

                listEl.innerHTML = uniqueVals.map(val => `
                    <label class="flex items-center gap-2 p-1.5 hover:bg-gray-50 rounded cursor-pointer">
                        <input type="checkbox" class="rounded text-corp-blue focus:ring-corp-blue" 
                            value="${val}" checked onchange="handleCheckboxChange('${setup.id}', this.value, this.checked)">
                        <span class="text-sm text-gray-700 truncate" title="${val}">${formatCurrencyIfNumber(val)}</span>
                    </label>
                `).join('');
                updateDropdownLabel(setup.id);
            });

            // Date Pickers Event
            document.getElementById('dateStart').addEventListener('change', debouncedApplyFilters);
            document.getElementById('dateEnd').addEventListener('change', debouncedApplyFilters);
        }

        function formatCurrencyIfNumber(val) {
            if(!isNaN(val) && val !== "") {
                return Number(val).toLocaleString('ko-KR');
            }
            return val;
        }

        function handleCheckboxChange(filterId, value, isChecked) {
            if (isChecked) {
                filterState[filterId].add(value);
            } else {
                filterState[filterId].delete(value);
            }
            updateDropdownLabel(filterId);
            debouncedApplyFilters();
        }

        function selectAll(filterId, isSelectAll) {
            const checkboxes = document.querySelectorAll(`#list-${filterId} input[type="checkbox"]`);
            checkboxes.forEach(cb => {
                cb.checked = isSelectAll;
                if (isSelectAll) filterState[filterId].add(cb.value);
                else filterState[filterId].delete(cb.value);
            });
            updateDropdownLabel(filterId);
            debouncedApplyFilters();
        }

        function updateDropdownLabel(filterId) {
            const totalCount = getUniqueValues(colKeys[filterId]).length;
            const selectedCount = filterState[filterId].size;
            const labelEl = document.getElementById(`label-${filterId}`);
            
            if (selectedCount === totalCount) labelEl.textContent = "전체 선택";
            else if (selectedCount === 0) labelEl.textContent = "선택 없음";
            else labelEl.textContent = `${selectedCount}개 선택됨`;
        }

        function toggleDropdown(filterId) {
            // Close others
            ['avgRev', 'currRev', 'opDays'].forEach(id => {
                if (id !== filterId) document.getElementById(`dropdown-${id}`).classList.remove('active');
            });
            document.getElementById(`dropdown-${filterId}`).classList.toggle('active');
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
                ['avgRev', 'currRev', 'opDays'].forEach(id => {
                    const dd = document.getElementById(`dropdown-${id}`);
                    if(dd) dd.classList.remove('active');
                });
            }
        });

        // Debounce implementation for performance
        function debouncedApplyFilters() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(applyFilters, 300);
        }

        function applyFilters() {
            const startStr = document.getElementById('dateStart').value;
            const endStr = document.getElementById('dateEnd').value;
            
            filteredData = rawDatabase.filter(row => {
                // 1. Date filter
                if (startStr && row._dateStr < startStr) return false;
                if (endStr && row._dateStr > endStr) return false;
                
                // 2. Multi Filters (AND Condition)
                if (colKeys.avgRev && !filterState.avgRev.has(String(row[colKeys.avgRev]))) return false;
                if (colKeys.currRev && !filterState.currRev.has(String(row[colKeys.currRev]))) return false;
                if (colKeys.opDays && !filterState.opDays.has(String(row[colKeys.opDays]))) return false;
                
                return true;
            });

            updateFilterSummary(startStr, endStr);
            renderDashboard();
        }

        function updateFilterSummary(start, end) {
            const summaryEl = document.getElementById('filterSummary');
            let text = `${start} ~ ${end}`;
            
            ['avgRev', 'currRev', 'opDays'].forEach(id => {
                if (!colKeys[id]) return;
                const total = getUniqueValues(colKeys[id]).length;
                const sel = filterState[id].size;
                const name = document.getElementById(`filter-wrapper-${id}`).querySelector('label').textContent;
                
                if (sel < total && sel > 0) {
                    text += ` | ${name}: ${sel}개 선택`;
                } else if (sel === 0) {
                    text += ` | ${name}: 제외됨`;
                }
            });
            
            summaryEl.textContent = text;
        }

        // --- 5. Rendering (Chart.js & Tables) ---
        function renderDashboard() {
            // KPI 계산
            let totalRev = 0;
            let companies = new Set();
            
            filteredData.forEach(row => {
                let rev = Number(row[colKeys.currRev] || 0);
                if (!isNaN(rev)) totalRev += rev;
                if (row[colKeys.company]) companies.add(row[colKeys.company]);
            });

            document.getElementById('kpi-totalRev').textContent = `₩${totalRev.toLocaleString('ko-KR')}`;
            document.getElementById('kpi-avgRev').textContent = filteredData.length ? `₩${Math.round(totalRev / filteredData.length).toLocaleString('ko-KR')}` : '₩0';
            document.getElementById('kpi-count').textContent = `${filteredData.length.toLocaleString('ko-KR')}건`;
            document.getElementById('kpi-companies').textContent = `${companies.size.toLocaleString('ko-KR')}개`;

            renderChart();
            renderCompanyTable();
        }

        function renderChart() {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            // 데이터 집계 (YYYY-MM 기준)
            const monthlyData = {};
            filteredData.forEach(row => {
                const month = row._dateStr.substring(0, 7); // YYYY-MM
                let rev = Number(row[colKeys.currRev] || 0);
                if (isNaN(rev)) rev = 0;
                
                if (!monthlyData[month]) monthlyData[month] = 0;
                monthlyData[month] += rev;
            });

            // 정렬
            const labels = Object.keys(monthlyData).sort();
            const data = labels.map(l => monthlyData[l]);

            if (chartInstance) {
                chartInstance.destroy(); // 인스턴스 재사용/초기화
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '월별 총 매출액',
                        data: data,
                        backgroundColor: '#1e3a8a', // corp-blue
                        borderRadius: 4,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return '₩' + context.parsed.y.toLocaleString('ko-KR');
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#e5e7eb', drawBorder: false },
                            ticks: {
                                callback: function(value) {
                                    if(value >= 100000000) return (value / 100000000).toFixed(1) + '억';
                                    if(value >= 10000) return (value / 10000).toFixed(0) + '만';
                                    return value;
                                }
                            }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function renderCompanyTable() {
            const tbody = document.getElementById('companyTableBody');
            
            // 업체별 집계
            const compStats = {};
            filteredData.forEach(row => {
                const comp = row[colKeys.company] || '미상';
                let rev = Number(row[colKeys.currRev] || 0);
                if (isNaN(rev)) rev = 0;

                if (!compStats[comp]) {
                    compStats[comp] = { count: 0, totalRev: 0 };
                }
                compStats[comp].count++;
                compStats[comp].totalRev += rev;
            });

            const sortedComps = Object.keys(compStats).sort((a,b) => compStats[b].totalRev - compStats[a].totalRev);

            tbody.innerHTML = sortedComps.map((comp, index) => {
                const stat = compStats[comp];
                const avg = Math.round(stat.totalRev / stat.count);
                const bgClass = index % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                return `
                    <tr class="${bgClass} hover:bg-corp-light transition">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-800">${comp}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-right">${stat.count.toLocaleString('ko-KR')}건</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-corp-blue text-right">₩${stat.totalRev.toLocaleString('ko-KR')}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-right">₩${avg.toLocaleString('ko-KR')}</td>
                    </tr>
                `;
            }).join('');
            
            if(sortedComps.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">조회된 데이터가 없습니다.</td></tr>`;
            }
        }

        // --- 6. Navigation Logic ---
        function switchTab(tabId) {
            // Reset active states
            document.getElementById('tab-overview').className = 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm';
            document.getElementById('tab-company').className = 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm';
            
            document.getElementById('view-overview').classList.add('hidden');
            document.getElementById('view-company').classList.add('hidden');

            // Set active
            document.getElementById(`tab-${tabId}`).className = 'border-corp-blue text-corp-blue whitespace-nowrap py-4 px-1 border-b-2 font-bold text-sm';
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
        }

        // Start execution on window load
        window.onload = initDashboard;

    </script>
</body>
</html>
